<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Match - Juego de Memoria</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.3);
    max-width: 600px;
    width: 100%;
  }

  h1 {
    color: white;
    text-align: center;
    font-size: 2.5em;
    margin-bottom: 10px;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
    letter-spacing: 2px;
    font-weight: 800;
  }

  .subtitle {
    text-align: center;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 25px;
    font-size: 1em;
    font-weight: 300;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 25px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  .stat-item {
    text-align: center;
    color: white;
  }

  .stat-label {
    font-size: 0.85em;
    opacity: 0.85;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-value {
    font-size: 1.8em;
    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.3);
  }

  .hearts {
    color: #ff6b9d;
    letter-spacing: 2px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .card {
    aspect-ratio: 1;
    perspective: 1000px;
    cursor: pointer;
    border-radius: 14px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    transform-style: preserve-3d;
    border-radius: 14px;
  }

  .card.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card.matched {
    animation: matchPulse 0.6s ease;
    pointer-events: none;
  }

  @keyframes matchPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
  }

  .card-front {
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%);
    color: white;
    font-size: 2.2em;
    font-weight: 800;
    text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:not(.flipped):not(.matched):hover .card-front {
    transform: scale(1.05);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
  }

  .card-back {
    background: white;
    transform: rotateY(180deg);
    border: 2px solid rgba(255, 255, 255, 0.6);
  }

  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
  }

  .card.matched .card-back {
    box-shadow: 0 0 20px rgba(76, 217, 100, 0.7), 0 6px 16px rgba(0, 0, 0, 0.25);
    border: 2px solid #4cd964;
  }

  .card.shake {
    animation: shake 0.5s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
  }

  button {
    background: linear-gradient(135deg, #ff6b9d 0%, #c471ed 100%);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 6px 16px rgba(196, 113, 237, 0.4);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(196, 113, 237, 0.55);
  }

  button:active {
    transform: translateY(0);
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
  }

  .modal.show {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
    padding: 40px;
    border-radius: 24px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(50px) scale(0.9);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .modal-icon {
    font-size: 4.5em;
    margin-bottom: 15px;
    display: block;
  }

  .modal h2 {
    color: #333;
    margin-bottom: 10px;
    font-size: 2em;
  }

  .modal p {
    color: #666;
    margin-bottom: 25px;
    font-size: 1.1em;
    line-height: 1.5;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container {
      padding: 20px 15px;
    }
    h1 {
      font-size: 1.8em;
    }
    .stat-value {
      font-size: 1.4em;
    }
    .card-front {
      font-size: 1.6em;
    }
    .board {
      gap: 8px;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>✨ Image Match ✨</h1>
    <p class="subtitle">Encuentra las 8 parejas antes de quedarte sin vidas</p>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">Vidas</div>
        <div class="stat-value hearts" id="lives">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Parejas</div>
        <div class="stat-value" id="pairs">0 / 8</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Intentos</div>
        <div class="stat-value" id="attempts">0</div>
      </div>
    </div>

    <div class="board" id="board"></div>

    <div class="controls">
      <button onclick="initGame()">🔄 Reiniciar</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="modal-icon" id="modalIcon">🎉</span>
      <h2 id="modalTitle">¡Ganaste!</h2>
      <p id="modalText">¡Felicidades! Encontraste todas las parejas.</p>
      <button onclick="closeModal()">Jugar de nuevo</button>
    </div>
  </div>

<script>
  const TOTAL_PAIRS = 8;
  const TOTAL_LIVES = 10;

  let cards = [];
  let flippedCards = [];
  let matchedPairs = 0;
  let lives = TOTAL_LIVES;
  let attempts = 0;
  let lockBoard = false;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function initGame() {
    matchedPairs = 0;
    lives = TOTAL_LIVES;
    attempts = 0;
    flippedCards = [];
    lockBoard = false;

    // Crear pares de imágenes (1.jpg al 8.jpg, cada una dos veces)
    const imageIds = [];
    for (let i = 1; i <= TOTAL_PAIRS; i++) {
      imageIds.push(i, i);
    }
    shuffle(imageIds);

    // Numeración del 1 al 16
    cards = imageIds.map((imgId, index) => ({
      number: index + 1,
      imageId: imgId,
      flipped: false,
      matched: false
    }));

    renderBoard();
    updateStats();
    closeModal();
  }

  function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    cards.forEach((card, index) => {
      const cardEl = document.createElement('div');
      cardEl.className = 'card';
      cardEl.dataset.index = index;
      cardEl.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-front">${card.number}</div>
          <div class="card-face card-back">
            <img src="${card.imageId}.jpg" alt="Imagen ${card.imageId}">
          </div>
        </div>
      `;
      cardEl.addEventListener('click', () => flipCard(index));
      board.appendChild(cardEl);
    });
  }

  function flipCard(index) {
    if (lockBoard) return;
    const card = cards[index];
    if (card.flipped || card.matched) return;
    if (flippedCards.length >= 2) return;

    card.flipped = true;
    const cardEl = document.querySelector(`.card[data-index="${index}"]`);
    cardEl.classList.add('flipped');
    flippedCards.push(index);

    if (flippedCards.length === 2) {
      attempts++;
      updateStats();
      checkMatch();
    }
  }

  function checkMatch() {
    lockBoard = true;
    const [i1, i2] = flippedCards;
    const c1 = cards[i1];
    const c2 = cards[i2];

    if (c1.imageId === c2.imageId) {
      // Match
      setTimeout(() => {
        c1.matched = true;
        c2.matched = true;
        document.querySelector(`.card[data-index="${i1}"]`).classList.add('matched');
        document.querySelector(`.card[data-index="${i2}"]`).classList.add('matched');
        matchedPairs++;
        flippedCards = [];
        lockBoard = false;
        updateStats();

        if (matchedPairs === TOTAL_PAIRS) {
          setTimeout(() => showModal('win'), 600);
        }
      }, 500);
    } else {
      // No match
      lives--;
      updateStats();

      const el1 = document.querySelector(`.card[data-index="${i1}"]`);
      const el2 = document.querySelector(`.card[data-index="${i2}"]`);
      el1.classList.add('shake');
      el2.classList.add('shake');

      setTimeout(() => {
        c1.flipped = false;
        c2.flipped = false;
        el1.classList.remove('flipped', 'shake');
        el2.classList.remove('flipped', 'shake');
        flippedCards = [];
        lockBoard = false;

        if (lives <= 0) {
          setTimeout(() => showModal('lose'), 300);
        }
      }, 1100);
    }
  }

  function updateStats() {
    const livesEl = document.getElementById('lives');
    livesEl.textContent = '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, TOTAL_LIVES - lives));
    document.getElementById('pairs').textContent = `${matchedPairs} / ${TOTAL_PAIRS}`;
    document.getElementById('attempts').textContent = attempts;
  }

  function showModal(result) {
    const modal = document.getElementById('modal');
    const icon = document.getElementById('modalIcon');
    const title = document.getElementById('modalTitle');
    const text = document.getElementById('modalText');

    if (result === 'win') {
      icon.textContent = '🎉';
      title.textContent = '¡Ganaste!';
      text.textContent = `¡Felicidades! Encontraste las 8 parejas en ${attempts} intentos con ${lives} vida(s) restante(s).`;
    } else {
      icon.textContent = '💔';
      title.textContent = '¡Te quedaste sin vidas!';
      text.textContent = `Lograste ${matchedPairs} de 8 parejas. ¡Inténtalo de nuevo!`;
    }

    modal.classList.add('show');

    if (result === 'lose') {
      // Reinicio automático tras un breve momento si el usuario no hace clic
      // (igual hay botón para jugar de nuevo)
    }
  }

  function closeModal() {
    const modal = document.getElementById('modal');
    modal.classList.remove('show');
    // Si el modal se cierra después de perder o ganar, reiniciar
    if (lives <= 0 || matchedPairs === TOTAL_PAIRS) {
      initGame();
    }
  }

  // Iniciar el juego
  initGame();
</script>
</body>
</html>
